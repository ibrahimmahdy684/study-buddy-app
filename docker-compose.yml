services:
  # ── Kafka Infrastructure ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ── Microservices ─────────────────────────────────
  user-service:
    build: ./services/user-service
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: ${USER_DB_URL} # NeonDB URL from .env
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER: kafka:9092
    depends_on: [kafka]

  profile-service:
    build: ./services/profile-service
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: ${PROFILE_DB_URL}
      KAFKA_BROKER: kafka:9092
      PORT: "4002"
    depends_on: [kafka]

  availability-service:
    build: ./services/availability-service
    ports:
      - "4003:4003"
    environment:
      DATABASE_URL: ${AVAILABILITY_DB_URL}
      KAFKA_BROKER: kafka:9092
    depends_on: [kafka]

  matching-service:
   build: ./services/matching-service
   ports:
     - "4004:4004"
   environment:
     DATABASE_URL: ${MATCHING_DB_URL}
     KAFKA_BROKER: kafka:9092
   depends_on: [kafka]

  session-service:
   build: ./services/session-service
   ports:
     - "4005:4005"
   environment:
     DATABASE_URL: ${SESSION_DB_URL}
     JWT_SECRET: ${JWT_SECRET}
     KAFKA_BROKER: kafka:9092
   depends_on: [kafka]

  notification-service:
    build: ./services/notification-service
    ports:
      - "4006:4006"
    environment:
      DATABASE_URL: ${NOTIFICATION_DB_URL}
      KAFKA_BROKER: kafka:9092
      PORT: "4006"
    depends_on: [kafka]

  messaging-service:
    build: ./services/messaging-service
    ports:
      - "4007:4007"
    environment:
      DATABASE_URL: ${MESSAGING_DB_URL}
      KAFKA_BROKER: kafka:9092
      PORT: "4007"
    depends_on: [kafka]

